# scry-dictate suppress submap for Hyprland
#
# scry_suppress: activated by the daemon during wtype output. Blocks all
#   modifier keys so injected keystrokes aren't misinterpreted as WM shortcuts.
#   The daemon resets back to global after wtype finishes. F12 emergency escape.

submap = scry_suppress
bind = , SUPER_L, exec, true
bind = , SUPER_R, exec, true
bind = , Control_L, exec, true
bind = , Control_R, exec, true
bind = , Alt_L, exec, true
bind = , Alt_R, exec, true
bind = , Shift_L, exec, true
bind = , Shift_R, exec, true
bind = , F12, submap, reset
submap = reset
