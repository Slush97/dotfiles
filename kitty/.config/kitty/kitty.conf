# Theme colors (switched by ~/.config/waybar/theme.sh)
include colors.conf

# Remote control for live theme switching
allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}

# Transparency
background_opacity 0.9

# Slightly soften the background for readability
# (This is a kitty-only setting; no compositor effects required)
background_tint 0.0

# Padding around terminal edges
window_padding_width 16

# Font tweaks for better weight/readability
font_family JetBrains Mono
font_size 13.5
font_weight 700

# Window management
kitty_mod super
map kitty_mod+f toggle_fullscreen
map kitty_mod+ctrl+left resize_window narrower
map kitty_mod+ctrl+right resize_window wider
map kitty_mod+ctrl+up resize_window taller
map kitty_mod+ctrl+down resize_window shorter
map kitty_mod+shift+left move_window left
map kitty_mod+shift+right move_window right
map kitty_mod+shift+up move_window up
map kitty_mod+shift+down move_window down

# Copy/Paste defaults
map ctrl+c copy_to_clipboard
map ctrl+v paste_from_clipboard

# Run fastfetch animation on startup
startup_session ~/.config/kitty/startup.session
